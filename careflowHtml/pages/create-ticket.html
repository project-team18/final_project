<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Ticket</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/tickets.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<h2>CareFlow</h2>

<ul>

<li><a href="../index.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

<li><a href="chat.html"><i class="fa-solid fa-comments"></i> AI Chat</a></li>

<li class="active"><a href="create-ticket.html"><i class="fa-solid fa-ticket"></i> Create Ticket</a></li>

<li><a href="my-tickets.html"><i class="fa-solid fa-list"></i> My Tickets</a></li>

<li><a href="faq.html"><i class="fa-solid fa-circle-question"></i> FAQ</a></li>

</ul>

</aside>

<main class="main">

<h1>Create Support Ticket</h1>

<form id="ticketForm">

<label>Issue Title</label>

<input
type="text"
id="title"
placeholder="Enter issue title">

<label>Category</label>

<select id="category">

<option>Order</option>

<option>Payment</option>

<option>Delivery</option>

<option>Account</option>

<option>Other</option>

</select>

<label>Priority</label>

<select id="priority">

<option>High</option>

<option>Medium</option>

<option>Low</option>

</select>

<label>Description</label>

<textarea
id="description"
rows="6"
placeholder="Describe your issue"></textarea>

<label>Upload Screenshot</label>

<input type="file">

<button type="submit">

Submit Ticket

</button>

</form>

</main>

</div>

<script src="../js/theme.js"></script>
<script src="../js/tickets.js"></script>

</body>
</html>
